<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zhuabao</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">AI-native traffic workspace</p>
        <h1>Zhuabao turns noisy capture logs into agent-ready flows.</h1>
        <p class="lede">Capture with a real proxy, inspect in a live console, replay safely, and export prompt packs instead of raw HAR blobs.</p>
        <div class="hero-actions">
          <button id="reloadRules">Reload rules</button>
          <button id="exportPrompt" class="ghost">Export prompt pack</button>
        </div>
        <div class="stats" id="stats"></div>
      </section>
      <section class="panel panel-list">
        <div class="panel-head">
          <h2>Live sessions</h2>
          <input id="search" placeholder="Search URL, host, method" />
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>
      <section class="panel panel-detail">
        <div class="panel-head">
          <h2>Session detail</h2>
          <span id="detailHint">Pick a request</span>
        </div>
        <pre id="detail"></pre>
      </section>
    </main>
    <template id="sessionItemTemplate">
      <button class="session-item">
        <span class="session-top"></span>
        <span class="session-bottom"></span>
      </button>
    </template>
    <script type="module" src="/app.js"></script>
  </body>
</html>
